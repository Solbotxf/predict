env: development

server:
  host: "0.0.0.0"
  port: 8000

pipeline:
  bus: "simple"          # "simple" | "redis_stream" | "kafka"
  store: "sqlite"        # "sqlite" | "timescale" | "clickhouse"
  sqlite_path: "data/pmt.db"

collectors:
  polymarket:
    enabled: true
    poll_interval: 30    # seconds
    base_url: "https://clob.polymarket.com"
    gamma_url: "https://gamma-api.polymarket.com"

analyzers:
  llm_prob:
    enabled: true
    provider: "anthropic"   # "anthropic" | "openai"
    model: "claude-3-haiku-20240307"
    cache_ttl: 3600         # seconds
  kelly:
    enabled: true
    fraction: 0.5           # Half-Kelly
    max_position: 0.25      # 25% max per market
  sentiment:
    enabled: false

engine:
  weights:
    llm_prob: 0.7
    sentiment: 0.2
    arb: 0.1
  min_confidence: 0.6
  min_edge: 0.03            # 3% minimum edge

backtest:
  initial_bankroll: 10000
  start_date: "2024-01-01"
  end_date: "2026-03-01"
