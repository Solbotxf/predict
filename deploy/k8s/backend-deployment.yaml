apiVersion: apps/v1
kind: Deployment
metadata:
  name: predict-backend
  namespace: predict
  labels:
    app: predict-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predict-backend
  template:
    metadata:
      labels:
        app: predict-backend
    spec:
      containers:
        - name: backend
          image: YOUR_REGISTRY/predict-backend:latest  # TODO: replace
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: predict-config
            - secretRef:
                name: predict-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
