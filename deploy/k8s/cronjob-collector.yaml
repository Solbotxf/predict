apiVersion: batch/v1
kind: CronJob
metadata:
  name: predict-collector
  namespace: predict
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: collector
              image: YOUR_REGISTRY/predict-backend:latest
              command: ["python", "scripts/seeds/seed_all.py"]
              workingDir: /app
              envFrom:
                - configMapRef:
                    name: predict-config
                - secretRef:
                    name: predict-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          restartPolicy: OnFailure
